<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지하철 빈자리 - 눈치 게임</title>
    <style>
        @keyframes train-shake {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-2px); }
            100% { transform: translateY(1px); }
        }
        @keyframes passing-lights {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #333;
        }

        /* 오프닝 메인 메뉴 화면 */
        #main-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            backdrop-filter: blur(5px);
        }
        .menu-box {
            background: #1a252f;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 4px solid #f1c40f;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
            width: 450px;
        }
        .menu-box h1 {
            color: #f1c40f;
            margin-top: 0;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }
        
        .rules-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 25px;
            border: 1px solid #7f8c8d;
        }
        .rules-box h3 {
            margin: 0 0 10px 0;
            color: #2ecc71;
            font-size: 18px;
            text-align: center;
        }
        .rules-box ul {
            margin: 0;
            padding-left: 20px;
            font-size: 13.5px;
            color: #bdc3c7;
            line-height: 1.6;
        }
        .rules-box li b { color: #e74c3c; }

        .difficulty-select {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .diff-btn {
            padding: 12px 20px;
            border: 2px solid #555;
            border-radius: 8px;
            cursor: pointer;
            background: #2c3e50;
            color: white;
            font-weight: bold;
            transition: 0.2s;
            flex: 1;
        }
        .diff-btn:hover { background: #34495e; }
        .diff-btn.selected {
            border-color: #f1c40f;
            background: #e67e22;
            box-shadow: 0 0 15px rgba(230, 126, 34, 0.5);
        }
        .start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.2s;
        }
        .start-btn:hover { background: #27ae60; transform: scale(1.05); }

        /* 지하철 내부 컨테이너 */
        #train-interior {
            display: none;
            background: linear-gradient(to bottom, #d5d5d5, #eeeeee, #bfbfbf);
            width: 850px;
            height: 520px;
            border-radius: 20px;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.6), 0 10px 40px rgba(0,0,0,0.9);
            position: relative;
            animation: train-shake 0.25s infinite alternate ease-in-out;
            overflow: hidden;
        }

        .window-container {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            width: 750px; height: 130px; background-color: #050505;
            border: 8px solid #777; border-radius: 10px; box-sizing: border-box;
            background-image: repeating-linear-gradient(90deg, transparent 0px, transparent 150px, rgba(255,255,200,0.15) 150px, rgba(255,255,200,0.15) 200px);
            background-size: 200% 100%; animation: passing-lights 0.8s linear infinite;
        }

        .handles {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 750px; display: flex; justify-content: space-around;
        }
        .handle {
            width: 24px; height: 45px; border: 5px solid #e67e22;
            border-top: none; border-radius: 0 0 24px 24px; position: relative;
        }
        .handle::before { content: ''; position: absolute; top: -20px; left: 9px; width: 6px; height: 20px; background-color: #444; }

        .seats-container {
            position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
            display: flex; width: 800px; background-color: #bbb;
            padding: 12px 6px; border-radius: 12px 12px 0 0; border-bottom: 6px solid #666;
        }
        
        .seat {
            flex: 1; background: linear-gradient(to bottom, #009040, #005a25);
            margin: 0 3px; height: 130px; border-radius: 6px 6px 0 0;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: white; cursor: pointer;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.4), 0 5px 5px rgba(0,0,0,0.2);
            transition: all 0.1s; position: relative;
        }
        .seat:hover { filter: brightness(1.25); transform: translateY(-2px); }
        .seat:active { transform: scale(0.95); }
        
        .passenger-state {
            font-size: 14px; text-align: center; padding: 5px; font-weight: bold;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.9); line-height: 1.4;
        }

        .alert-icon {
            position: absolute; top: -30px; font-size: 24px;
            display: none; text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }

        .ui-bar {
            position: absolute; bottom: 0; width: 100%; height: 130px;
            background-color: #1a252f; color: white; display: flex;
            justify-content: space-between; padding: 15px 25px; box-sizing: border-box;
            border-top: 3px solid #000;
        }

        .status-panel { width: 30%; display: flex; flex-direction: column; justify-content: center; }
        .gauge-bg { width: 100%; height: 18px; background: #444; border-radius: 10px; margin-top: 8px; overflow: hidden; border: 1px solid #777; }
        #awkward-bar { height: 100%; width: 0%; background: #e74c3c; transition: width 0.2s; }
        
        .log-panel { width: 45%; background: #0b1116; padding: 12px; border-radius: 8px; font-size: 13px; overflow-y: auto; color: #ecf0f1; line-height: 1.6; height: 80px; border: 1px solid #34495e; }
        
        .skill-panel { width: 22%; display: flex; flex-direction: column; gap: 8px; justify-content: center; }
        button.action-btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .btn-ignore { background: #7f8c8d; color: white; }
        .btn-ignore:hover { background: #95a5a6; }
        .btn-skill { background: #8e44ad; color: white; box-shadow: 0 0 10px rgba(142,68,173,0.5); }
        .btn-skill:hover { background: #9b59b6; }
        .btn-skill:disabled { background: #555; color: #888; box-shadow: none; cursor: not-allowed; }
        
        .penalty-warning { color: #f39c12; font-weight: bold; }
        .penalty-danger { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div id="main-menu">
    <div class="menu-box">
        <h1>🚇 지하철 빈자리</h1>
        
        <div class="rules-box">
            <h3>📖 게임 규칙</h3>
            <ul>
                <li>승객들의 <b>진짜 하차 신호</b>를 눈치껏 파악해 빈자리를 쟁취하세요.</li>
                <li>앉지 못하고 <b>오래 서 있을수록</b> 민망 게이지가 <b>지속적으로 상승</b>합니다.</li>
                <li><b>[패널티] 환승각 계산(스캔)</b>은 사람들을 대놓고 관찰하므로 <b>사용 즉시 민망함이 15 상승</b>합니다.</li>
                <li>'딴청 피우기'는 <b>4연속 사용 시</b> 이상한 사람으로 몰려 페널티(+25)를 받습니다.</li>
            </ul>
            <div style="margin-top: 10px; text-align: center; color: #f1c40f; font-weight: bold; font-size: 15px;">
                🏆 내 최고 기록: <span id="menu-highscore">0</span>회
            </div>
        </div>
        
        <div class="difficulty-select">
            <button class="diff-btn selected" id="diff-normal" onclick="selectDifficulty('normal')">
                일반 모드<br><span style="font-size:11px; font-weight:normal;">(조금 여유로움)</span>
            </button>
            <button class="diff-btn" id="diff-hard" onclick="selectDifficulty('hard')">
                지옥 모드<br><span style="font-size:11px; font-weight:normal;">(페이크 남발 / 빠른 게이지)</span>
            </button>
        </div>
        
        <button class="start-btn" onclick="startGame()">게임 시작</button>
    </div>
</div>

<div id="train-interior">
    <div class="handles">
        <div class="handle"></div><div class="handle"></div><div class="handle"></div>
        <div class="handle"></div><div class="handle"></div><div class="handle"></div>
    </div>
    
    <div class="window-container"></div>
    <div class="seats-container" id="seats-container"></div>

    <div class="ui-bar">
        <div class="status-panel">
            <div style="display: flex; justify-content: space-between; font-weight: bold;">
                <span style="color: #2ecc71; font-size: 16px;">현재: <span id="score">0</span>회</span>
                <span style="color: #f1c40f; font-size: 16px;">최고: <span id="game-highscore">0</span>회</span>
            </div>
            <div style="margin-top: 10px; font-size: 14px; color: #e74c3c; font-weight: bold;">민망 게이지: <span id="awkward-text">0</span>%</div>
            <div class="gauge-bg"><div id="awkward-bar"></div></div>
        </div>
        
        <div class="log-panel" id="log"></div>

        <div class="skill-panel">
            <button class="action-btn btn-ignore" id="ignore-btn" onclick="useIgnoreSkill()">딴청 피우기 <span id="ignore-counter">(0/3)</span></button>
            <button class="action-btn btn-skill" id="scan-btn" onclick="useScanSkill()">환승각 계산 (스캔)</button>
        </div>
    </div>
</div>

<script>
    let currentDifficulty = 'normal';
    let baseInterval = 1800; 
    let fakeMultiplier = 0.5; 
    let passiveAwkwardness = 3; 

    const BEHAVIORS = [
        { text: "😴 깊은 숙면 중", realProb: 0.1, fakeProb: 0.1, danger: 20, fakeMsg: "자다 깨서 기지개를 켠 것뿐이었습니다!" },
        { text: "📱 폰 몰입 중", realProb: 0.1, fakeProb: 0.1, danger: 15, fakeMsg: "핸드폰 배터리가 없어 가방에 넣었을 뿐입니다." },
        { text: "🦵 다리 풀기", realProb: 0.2, fakeProb: 0.5, danger: 25, fakeMsg: "다리가 저려서 자세만 바꿨습니다." },
        { text: "🎒 가방 뒤적거림", realProb: 0.3, fakeProb: 0.7, danger: 40, fakeMsg: "가방에서 에어팟을 꺼냈을 뿐 안 내립니다!" },
        { text: "👀 문 쪽 힐끗", realProb: 0.4, fakeProb: 0.5, danger: 35, fakeMsg: "내릴 준비가 아니라 노선도를 본 거였습니다!" },
        { text: "💼 짐 챙기는 중", realProb: 0.5, fakeProb: 0.4, danger: 30, fakeMsg: "짐을 고쳐 멨을 뿐입니다. 페이크에 당했습니다!" },
        { text: "🎧 이어폰 정리", realProb: 0.6, fakeProb: 0.3, danger: 20, fakeMsg: "노래만 끄고 계속 앉아있습니다." }
    ];

    let seats = new Array(7).fill(null);
    let score = 0;
    let highScore = 0; // 최고기록 변수
    let awkwardness = 0;
    let ignoreCount = 0; 
    let gameInterval;
    let scanActive = false;
    let isGameOver = false;

    // 💡 페이지 로드 시 백엔드 데이터(LocalStorage) 불러오기
    window.onload = function() {
        highScore = localStorage.getItem('subway_game_highscore') || 0;
        document.getElementById('menu-highscore').innerText = highScore;
        document.getElementById('game-highscore').innerText = highScore;
    }

    function selectDifficulty(level) {
        document.getElementById('diff-normal').classList.remove('selected');
        document.getElementById('diff-hard').classList.remove('selected');
        
        if(level === 'normal') {
            document.getElementById('diff-normal').classList.add('selected');
            currentDifficulty = 'normal';
            baseInterval = 1800;
            fakeMultiplier = 0.5;
            passiveAwkwardness = 3; 
        } else {
            document.getElementById('diff-hard').classList.add('selected');
            currentDifficulty = 'hard';
            baseInterval = 1200;
            fakeMultiplier = 1.0;
            passiveAwkwardness = 5; 
        }
    }

    function startGame() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('train-interior').style.display = 'block';
        
        const modeText = currentDifficulty === 'normal' ? '일반 모드' : '지옥 모드';
        addLog(`[시스템] ${modeText}를 시작합니다.`);
        
        initGame();
    }

    function initGame() {
        const container = document.getElementById('seats-container');
        container.innerHTML = '';
        for (let i = 0; i < 7; i++) {
            seats[i] = generatePassenger();
            const seatDiv = document.createElement('div');
            seatDiv.className = 'seat';
            seatDiv.id = `seat-${i}`;
            seatDiv.onclick = () => trySit(i);
            
            seatDiv.innerHTML = `
                <div class="alert-icon" id="alert-${i}">❗</div>
                <div class="passenger-state" id="state-${i}">${seats[i].text}</div>
            `;
            container.appendChild(seatDiv);
        }
        
        gameInterval = setInterval(updateSubway, baseInterval);
    }

    function generatePassenger() {
        const base = BEHAVIORS[Math.floor(Math.random() * BEHAVIORS.length)];
        const rand = Math.random();
        const adjustedFakeProb = base.fakeProb * fakeMultiplier;

        let actualType;
        if (rand < base.realProb) actualType = "LEAVE";
        else if (rand < base.realProb + adjustedFakeProb) actualType = "FAKE";
        else actualType = "STAY";

        return { text: base.text, type: actualType, danger: base.danger, fakeMsg: base.fakeMsg };
    }

    function updateSubway() {
        if (isGameOver) return;

        for (let i = 0; i < 7; i++) {
            if (seats[i].type === "EMPTY") {
                if (Math.random() < 0.6) {
                    addLog(`[돌발] 빈자리를 '순간가속 할머니'가 차지했습니다!`);
                    seats[i] = generatePassenger();
                }
            } else {
                if (Math.random() < 0.35) {
                    seats[i] = generatePassenger();
                }
            }
            renderSeat(i);
        }
        scanActive = false; 
        
        awkwardness += passiveAwkwardness; 
        
        if (Math.random() < 0.2) {
            addLog(`<span style="color:#f39c12;">[시스템] 빈자리를 찾지 못해 서성이자, 사람들의 시선이 느껴집니다. (게이지 상승)</span>`);
        }

        updateGauge();
        checkGameOver();
    }

    function renderSeat(index) {
        const stateDiv = document.getElementById(`state-${index}`);
        const alertIcon = document.getElementById(`alert-${index}`);
        
        stateDiv.innerText = seats[index].text;
        
        if (scanActive) {
            if (seats[index].type === "FAKE") alertIcon.innerText = "❌";
            else if (seats[index].type === "LEAVE") alertIcon.innerText = "⭕";
            else alertIcon.innerText = "";
            alertIcon.style.display = "block";
        } else {
            alertIcon.style.display = "none";
        }
    }

    function trySit(index) {
        if (isGameOver) return;

        const target = seats[index];
        
        if (target.type === "LEAVE" || target.type === "EMPTY") {
            addLog(`🟢 [성공] ${index+1}번 승객이 내렸습니다! 눈치 싸움 승리.`);
            score++;
            document.getElementById('score').innerText = score;
            
            // 💡 최고 기록 실시간 업데이트 및 저장
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('subway_game_highscore', highScore);
                document.getElementById('game-highscore').innerText = highScore;
            }

            awkwardness = Math.max(0, awkwardness - 40);
            ignoreCount = 0; 
            updateIgnoreUI();

            seats[index] = { text: "😎 내가 앉음", type: "STAY", danger: 0, fakeMsg: "" };
            setTimeout(() => {
                seats[index] = generatePassenger();
            }, 2000);
            
            clearInterval(gameInterval);
            let speedDec = currentDifficulty === 'normal' ? 30 : 60;
            let newSpeed = Math.max(700, baseInterval - (score * speedDec)); 
            gameInterval = setInterval(updateSubway, newSpeed);
            
        } else if (target.type === "FAKE") {
            addLog(`💥 [치명적 낚시] ${target.fakeMsg} 시선이 집중됩니다!`);
            awkwardness += (target.danger + 10);
        } else {
            addLog(`❌ [실패] 헛다리 짚었습니다. 앞에 멀뚱히 서 있게 됩니다.`);
            awkwardness += target.danger;
        }
        
        renderSeat(index);
        updateGauge();
        checkGameOver();
    }

    function useIgnoreSkill() {
        if (isGameOver) return;
        
        ignoreCount++;
        
        if (ignoreCount > 3) {
            addLog(`<span class="penalty-danger">📵 [부작용] 계속 폰만 보는 척하자 주변에서 이상하게 쳐다봅니다! 민망함 폭증!</span>`);
            awkwardness += 25; 
        } else {
            addLog(`📱 핸드폰으로 바쁜 척하며 시선을 피합니다. (민망함 감소)`);
            awkwardness = Math.max(0, awkwardness - 15);
            if(ignoreCount === 3) {
                addLog(`<span class="penalty-warning">⚠️ [경고] 딴청 피우기를 너무 많이 사용했습니다. 1번만 더 쓰면 의심받습니다.</span>`);
            }
        }
        
        updateIgnoreUI();
        updateGauge();
        checkGameOver();
    }
    
    function updateIgnoreUI() {
        const counterSpan = document.getElementById('ignore-counter');
        if (ignoreCount >= 3) {
            counterSpan.innerHTML = `<span style="color:#e74c3c;">(위험)</span>`;
        } else {
            counterSpan.innerText = `(${ignoreCount}/3)`;
        }
    }

    // 💡 환승각 계산 불이익(패널티) 시스템 추가
    function useScanSkill() {
        if (isGameOver) return;
        const btn = document.getElementById('scan-btn');
        btn.disabled = true;
        
        // 불이익 부여: 너무 티나게 스캔해서 민망 게이지 상승
        addLog(`<span class="penalty-danger">👁️ [패널티] 사람들을 너무 유심히 쳐다보아 주변의 따가운 눈총을 받았습니다! (민망함 +15)</span>`);
        awkwardness += 15;
        updateGauge();
        checkGameOver();
        
        // 게이지 폭발로 게임오버가 안 되었을 때만 스캔 활성화
        if (!isGameOver) {
            scanActive = true;
            for(let i=0; i<7; i++) renderSeat(i);
            
            setTimeout(() => {
                if(!isGameOver) btn.disabled = false;
            }, 6000);
        }
    }

    function updateGauge() {
        if (awkwardness > 100) awkwardness = 100;
        document.getElementById('awkward-bar').style.width = awkwardness + '%';
        document.getElementById('awkward-text').innerText = awkwardness;
    }

    function checkGameOver() {
        if (awkwardness >= 100 && !isGameOver) {
            isGameOver = true;
            clearInterval(gameInterval);
            document.getElementById('train-interior').style.animation = 'none';
            document.getElementById('ignore-btn').disabled = true;
            document.getElementById('scan-btn').disabled = true;
            addLog(`<br><span style="font-size:16px; color:#e74c3c; font-weight:bold;">🚨 민망함 게이지 100% 초과!</span>`);
            addLog(`"저 사람 빈자리 노리다 실패했네ㅋㅋ" 따가운 시선에 결국 다음 역에서 도망치듯 내립니다... [게임 오버]`);
            
            // 게임오버 시 메인 메뉴의 최고 기록 최신화 준비
            document.getElementById('menu-highscore').innerText = highScore;
        }
    }

    function addLog(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML = `${msg}<br>${logDiv.innerHTML}`;
    }
</script>

</body>
</html>
